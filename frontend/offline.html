<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c2410c" />
    <title>Sem conexão · Dahora Atacadista</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, sans-serif;
        color: #1c1210;
        background: radial-gradient(circle at 20% 20%, #fff3e8, #fff8f2);
        text-align: center;
      }
      h1 { color: #c2410c; margin: 0 0 0.75rem; }
      p { color: #6b564c; line-height: 1.5; }
      button {
        border: 0;
        border-radius: 999px;
        padding: 0.75rem 1.25rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #c2410c, #ea580c);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Você está offline</h1>
      <p>Não foi possível carregar o Dahora Atacadista. Verifique a internet.</p>
      <button type="button" onclick="location.reload()">Tentar de novo</button>
    </main>
  </body>
</html>
