services:
  postgres:
    image: postgres:16-alpine
    container_name: dahora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dahora
      POSTGRES_PASSWORD: dahora_dev
      POSTGRES_DB: dahora
    volumes:
      - dahora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dahora -d dahora"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dahora_pg_data:
