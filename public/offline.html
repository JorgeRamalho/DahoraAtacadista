<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c2410c" />
    <title>Sem conexão · Dahora Atacadista</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1c1210;
        --forest: #c2410c;
        --cream: #fff8f2;
        --slate: #6b564c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: system-ui, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 20%, #fff3e8, var(--cream));
      }
      main {
        max-width: 22rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        color: var(--forest);
      }
      p {
        margin: 0 0 1.25rem;
        line-height: 1.5;
        color: var(--slate);
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1.25rem;
        font: inherit;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #c2410c, #ea580c);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Você está offline</h1>
      <p>
        Não foi possível carregar a página. Verifique sua internet e tente
        novamente.
      </p>
      <button type="button" onclick="location.reload()">Tentar de novo</button>
    </main>
  </body>
</html>
