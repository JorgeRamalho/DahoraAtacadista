<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ · Dahora</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="site-header">
        <div class="container header-inner">
          <a class="logo" href="index.html">
            <span class="logo-mark">DH</span>
            <span class="logo-text"><strong>Dahora</strong><span>Atacadista</span></span>
          </a>
          <nav class="nav-desktop" aria-label="Principal">
            <a href="index.html">Início</a>
            <a href="dahora-card.html">Dahora Card</a>
            <a href="faq.html" aria-current="page">FAQ</a>
            <a href="tire-sua-duvida.html">Tire sua dúvida</a>
            <a href="sac.html">SAC 24h</a>
            <a href="area-cliente.html">Área do Cliente</a>
          </nav>
          <div class="header-actions">
            <a class="btn btn-primary" href="cadastro.html">Pedir cartão</a>
          </div>
          <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false">☰</button>
        </div>
        <div class="nav-mobile" data-menu-panel>
          <div class="container">
            <a href="faq.html">FAQ</a>
            <a href="tire-sua-duvida.html">Tire sua dúvida</a>
            <a href="sac.html">SAC 24h</a>
          </div>
        </div>
      </header>

      <main>
        <section class="page-hero">
          <div class="container">
            <p class="eyebrow">Central de ajuda</p>
            <h1>Perguntas frequentes</h1>
            <p>Respostas claras sobre cartão, pontos, conta e atendimento.</p>
          </div>
        </section>

        <section class="section" style="padding-top: 2.5rem">
          <div class="container max-form">
            <div class="faq-controls">
              <label class="sr-only" for="faq-busca">Buscar</label>
              <input id="faq-busca" class="field" data-faq-search placeholder="Buscar pergunta ou resposta…" style="padding:0.85rem 1rem;border-radius:0.875rem;border:1.5px solid var(--dahora-line);width:100%;font:inherit" />
              <label class="sr-only" for="faq-cat">Categoria</label>
              <select id="faq-cat" data-faq-filter style="padding:0.85rem 1rem;border-radius:0.875rem;border:1.5px solid var(--dahora-line);width:100%;font:inherit;background:#fff"></select>
            </div>
            <div data-faq-list></div>
            <div class="mt-4" style="display:flex;flex-wrap:wrap;gap:0.75rem">
              <a class="btn btn-primary" href="tire-sua-duvida.html">Tire sua dúvida</a>
              <a class="btn btn-secondary" href="sac.html">Abrir chamado SAC</a>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container footer-bottom">
          <p>© <span data-year></span> Dahora Atacadista</p>
        </div>
      </footer>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
